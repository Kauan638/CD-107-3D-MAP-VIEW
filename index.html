<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Visualizador 3D de Endereços - CD</title>
<link rel="stylesheet" href="style.css?v=1">
</head>
<body>
<div id="app">

  <!-- TELA DE SELECAO -->
  <div id="select-screen">
    <div class="select-box">
      <h1>VISUALIZADOR 3D DE ENDEREÇOS</h1>
      <p id="select-hint">Carregue o arquivo "Posição de endereços.txt" (exportado do WMS) pra habilitar os pavilhões.</p>

      <label class="file-btn" id="file-label">
        Selecionar arquivo de posição de endereços
        <input type="file" id="file-input" accept=".txt" style="display:none">
      </label>
      <div id="load-status"></div>

      <div id="pav-grid" class="pav-grid">
        <button class="pav-card" data-pav="Pavilhao 1" disabled>
          <div class="pav-name">Pavilhão 1</div>
          <div class="pav-count" id="count-Pavilhao1">-</div>
        </button>
        <button class="pav-card" data-pav="Pavilhao 2" disabled>
          <div class="pav-name">Pavilhão 2</div>
          <div class="pav-count" id="count-Pavilhao2">-</div>
        </button>
        <button class="pav-card" data-pav="Pavilhao 3" disabled>
          <div class="pav-name">Pavilhão 3</div>
          <div class="pav-count" id="count-Pavilhao3">-</div>
        </button>
        <button class="pav-card" data-pav="Perecivel" disabled>
          <div class="pav-name">Perecível</div>
          <div class="pav-count" id="count-Perecivel">-</div>
        </button>
      </div>
    </div>
  </div>

  <!-- TELA 3D -->
  <div id="scene-screen" style="display:none">
    <div id="hud">
      <button id="btn-back">← voltar</button>
      <h1 id="scene-title">-</h1>
      <p id="scene-sub">-</p>
    </div>
    <div id="legend">
      <div class="row"><div class="sw" style="background:#B5895A"></div>Apanha</div>
      <div class="row"><div class="sw" style="background:#D8C9A3"></div>Pulmão</div>
    </div>
    <div id="controls">arraste: girar · scroll: zoom · botão direito: pan · clique: detalhes do endereço</div>
    <div id="panel"></div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="script.js?v=1"></script>
</body>
</html>
